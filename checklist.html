<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>清单</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e8e8e4;
    --text: #1a1a1a;
    --text-muted: #999;
    --accent: #1a1a1a;
    --done-color: #bbb;
    --tab-active: #1a1a1a;
    --tab-inactive: #aaa;
    --radius: 12px;
    --input-h: 56px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── Tabs ── */
  #tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    padding: 0 20px;
  }

  .tab-btn {
    flex: 1;
    padding: 16px 0 14px;
    background: none;
    border: none;
    font-size: 15px;
    font-weight: 500;
    color: var(--tab-inactive);
    cursor: pointer;
    position: relative;
    transition: color .2s;
    letter-spacing: .02em;
  }

  .tab-btn.active {
    color: var(--tab-active);
  }

  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 20%;
    right: 20%;
    height: 2px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
  }

  /* ── List area ── */
  #list-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px 8px;
  }

  /* ── Empty state ── */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 8px;
    color: var(--text-muted);
    font-size: 14px;
    user-select: none;
  }

  .empty-icon { font-size: 36px; opacity: .4; }

  /* ── Shopping list items ── */
  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 14px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    transition: opacity .15s;
  }

  .item.done { opacity: .55; }

  .check-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
  }

  .item.done .check-btn {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-btn svg { display: none; }
  .item.done .check-btn svg { display: block; }

  .item-text {
    flex: 1;
    font-size: 15px;
    line-height: 1.4;
    word-break: break-all;
    transition: color .15s;
  }

  .item.done .item-text {
    text-decoration: line-through;
    color: var(--done-color);
  }

  .del-btn {
    width: 28px;
    height: 28px;
    border: none;
    background: none;
    cursor: pointer;
    color: #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: color .15s;
  }

  .del-btn:active { color: #e55; }

  /* ── Timeline (places) ── */
  .timeline {
    position: relative;
    padding-left: 28px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 9px;
    top: 8px;
    bottom: 8px;
    width: 2px;
    background: var(--border);
    border-radius: 2px;
  }

  .tl-item {
    position: relative;
    margin-bottom: 12px;
  }

  .tl-dot {
    position: absolute;
    left: -23px;
    top: 14px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--border);
    transition: background .15s, border-color .15s;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .tl-item.done .tl-dot {
    background: var(--accent);
    border-color: var(--accent);
  }

  .tl-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: opacity .15s;
  }

  .tl-item.done .tl-card { opacity: .5; }

  .tl-body { flex: 1; min-width: 0; }

  .tl-name {
    font-size: 15px;
    line-height: 1.4;
    word-break: break-all;
    transition: color .15s;
  }

  .tl-item.done .tl-name {
    text-decoration: line-through;
    color: var(--done-color);
  }

  .tl-time {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .tl-del {
    width: 28px;
    height: 28px;
    border: none;
    background: none;
    cursor: pointer;
    color: #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: color .15s;
  }

  .tl-del:active { color: #e55; }

  /* ── Section header (done items) ── */
  .section-header {
    font-size: 12px;
    color: var(--text-muted);
    padding: 12px 4px 6px;
    letter-spacing: .04em;
    text-transform: uppercase;
    user-select: none;
  }

  /* ── Input bar ── */
  #input-bar {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    padding-bottom: calc(10px + var(--safe-bottom));
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #item-input {
    flex: 1;
    height: var(--input-h);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0 14px;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
    font-family: inherit;
  }

  #item-input:focus { border-color: var(--accent); }
  #item-input::placeholder { color: var(--text-muted); }

  #add-btn {
    width: var(--input-h);
    height: var(--input-h);
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: opacity .15s;
  }

  #add-btn:active { opacity: .7; }

  /* ── Scrollbar ── */
  #list-area::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div id="app">
  <div id="tabs">
    <button class="tab-btn active" data-tab="shopping" onclick="switchTab('shopping')">🛒 购物清单</button>
    <button class="tab-btn" data-tab="places" onclick="switchTab('places')">📍 地点清单</button>
  </div>

  <div id="list-area"></div>

  <div id="input-bar">
    <input id="item-input" type="text" placeholder="添加新项目…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="add-btn" onclick="addItem()">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 4v12M4 10h12" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────
let currentTab = 'shopping';

function loadData(tab) {
  try { return JSON.parse(localStorage.getItem('cl_' + tab)) || []; }
  catch { return []; }
}

function saveData(tab, items) {
  localStorage.setItem('cl_' + tab, JSON.stringify(items));
}

function getItems() { return loadData(currentTab); }
function setItems(items) { saveData(currentTab, items); }

// ── Tab switch ─────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  const input = document.getElementById('item-input');
  input.placeholder = tab === 'shopping' ? '添加购物项目…' : '添加地点（如：超市、咖啡馆）…';
  render();
}

// ── Add ────────────────────────────────────────────────
function addItem() {
  const input = document.getElementById('item-input');
  const text = input.value.trim();
  if (!text) return;

  const items = getItems();
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const dateStr = (now.getMonth()+1) + '月' + now.getDate() + '日 ' + timeStr;

  items.unshift({ id: Date.now(), text, done: false, addedAt: dateStr });
  setItems(items);
  input.value = '';
  render();
  // scroll to top
  document.getElementById('list-area').scrollTop = 0;
}

// ── Toggle done ────────────────────────────────────────
function toggleItem(id) {
  const items = getItems();
  const item = items.find(i => i.id === id);
  if (item) item.done = !item.done;
  setItems(items);
  render();
}

// ── Delete ─────────────────────────────────────────────
function deleteItem(id) {
  const items = getItems().filter(i => i.id !== id);
  setItems(items);
  render();
}

// ── Render ─────────────────────────────────────────────
function render() {
  const area = document.getElementById('list-area');
  const items = getItems();

  if (items.length === 0) {
    area.innerHTML = `<div class="empty">
      <span class="empty-icon">${currentTab === 'shopping' ? '🛒' : '🗺️'}</span>
      <span>${currentTab === 'shopping' ? '清单是空的，添加第一项吧' : '还没有地点，规划今日行程吧'}</span>
    </div>`;
    return;
  }

  if (currentTab === 'shopping') {
    renderShopping(area, items);
  } else {
    renderPlaces(area, items);
  }
}

function renderShopping(area, items) {
  const pending = items.filter(i => !i.done);
  const done = items.filter(i => i.done);

  let html = '';

  pending.forEach(item => {
    html += `<div class="item" id="item-${item.id}">
      <button class="check-btn" onclick="toggleItem(${item.id})">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
          <path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="item-text">${escHtml(item.text)}</span>
      <button class="del-btn" onclick="deleteItem(${item.id})">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>`;
  });

  if (done.length > 0) {
    html += `<div class="section-header">已完成 ${done.length}</div>`;
    done.forEach(item => {
      html += `<div class="item done" id="item-${item.id}">
        <button class="check-btn" onclick="toggleItem(${item.id})">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
            <path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <span class="item-text">${escHtml(item.text)}</span>
        <button class="del-btn" onclick="deleteItem(${item.id})">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>`;
    });
  }

  area.innerHTML = html;
}

function renderPlaces(area, items) {
  const pending = items.filter(i => !i.done);
  const done = items.filter(i => i.done);

  let html = '<div class="timeline">';

  pending.forEach(item => {
    html += `<div class="tl-item" id="item-${item.id}">
      <div class="tl-dot" onclick="toggleItem(${item.id})"></div>
      <div class="tl-card">
        <div class="tl-body">
          <div class="tl-name">${escHtml(item.text)}</div>
          <div class="tl-time">添加于 ${item.addedAt || ''}</div>
        </div>
        <button class="tl-del" onclick="deleteItem(${item.id})">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>`;
  });

  html += '</div>';

  if (done.length > 0) {
    html += `<div class="section-header">已到访 ${done.length}</div><div class="timeline">`;
    done.forEach(item => {
      html += `<div class="tl-item done" id="item-${item.id}">
        <div class="tl-dot" onclick="toggleItem(${item.id})"></div>
        <div class="tl-card">
          <div class="tl-body">
            <div class="tl-name">${escHtml(item.text)}</div>
            <div class="tl-time">添加于 ${item.addedAt || ''}</div>
          </div>
          <button class="tl-del" onclick="deleteItem(${item.id})">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  area.innerHTML = html;
}

// ── Utils ──────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Enter key ──────────────────────────────────────────
document.getElementById('item-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); addItem(); }
});

// ── Init ───────────────────────────────────────────────
switchTab('shopping');
</script>
</body>
</html>
